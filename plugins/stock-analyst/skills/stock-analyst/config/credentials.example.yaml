# 이 파일을 credentials.yaml 로 복사한 뒤 값을 채우세요.
# credentials.yaml 은 절대 git 에 커밋하지 마세요 (.gitignore 에 추가).
# 또는 환경변수 KIS_APPKEY / KIS_APPSECRET / KIS_ACCOUNT / KIS_ENV 로 대체 가능.

appkey: "여기에_APP_KEY_36자리"
appsecret: "여기에_APP_SECRET_180자리"

# 잔고 자동조회(--balance)를 쓸 때만 필요. 형식: 앞8자리-뒤2자리
account: "12345678-01"

# real = 실전투자, mock = 모의투자
env: "real"
